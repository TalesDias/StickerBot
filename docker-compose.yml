services:
  evolution-api:
    container_name: evolution-api
    image: evoapicloud/evolution-api:homolog
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - evolution-sessions:/app/sessions
    networks:
      - evolution-net
    depends_on:
      - postgres
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=evolution
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - evolution-net

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    command: redis-server --port 6379 --appendonly yes
    networks:
      - evolution-net
    volumes:
      - evolution_redis:/data
    ports:
      - 6379:6379

volumes:
  evolution-sessions:
  postgres-data:
  evolution_redis:

networks:
  evolution-net:
    name: evolution-net
    driver: bridge
